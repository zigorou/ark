version: "2"

linters:
  enable:
    # Correctness
    - errcheck       # unchecked errors
    - govet          # go vet checks
    - staticcheck    # comprehensive static analysis
    - ineffassign    # assignments whose values are never used
    - unused         # unused constants, variables, functions and types

    # Style & conventions
    - revive         # highly configurable golint replacement
    - misspell       # spelling mistakes in comments/strings
    - whitespace     # leading/trailing blank lines

    # Bugs
    - bodyclose      # HTTP response body not closed
    - noctx          # HTTP requests without context
    - rowserrcheck   # sql.Rows.Err() not checked
    - sqlclosecheck  # sql.Rows and sql.Stmt not closed

    # Security
    - gosec          # security-focused checks

    # Complexity
    - cyclop         # cyclomatic complexity
    - gocognit       # cognitive complexity

  settings:
    revive:
      rules:
        - name: exported
        - name: error-strings
        - name: error-return
        - name: increment-decrement
        - name: var-declaration
        - name: range

    gosec:
      excludes:
        - G304  # file inclusion via variable — acceptable for vault file reads

    cyclop:
      max-complexity: 15

    gocognit:
      min-complexity: 20

  exclusions:
    rules:
      # Test files are exempt from some style checks
      - path: "_test\\.go"
        linters:
          - gosec
      # main.go exempt from some style checks (cobra generates boilerplate)
      - path: "main\\.go"
        linters:
          - gocognit

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/zigorou/ark
